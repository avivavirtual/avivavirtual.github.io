services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: aviva-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-avivavirtual}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-avivavirtual}']
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - aviva-network

  redis:
    image: redis:7-alpine
    container_name: aviva-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    networks:
      - aviva-network

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: aviva-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    ports:
      - '3001:3001'
    networks:
      - aviva-network

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: aviva-web
    restart: unless-stopped
    depends_on:
      - api
    env_file:
      - .env
    ports:
      - '3000:3000'
    networks:
      - aviva-network

networks:
  aviva-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
