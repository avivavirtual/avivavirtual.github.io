version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: aviva-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-avivavirtual}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - aviva-network

  redis:
    image: redis:7-alpine
    container_name: aviva-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    networks:
      - aviva-network

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: aviva-api
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
    ports:
      - '3001:3001'
    networks:
      - aviva-network

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: aviva-web
    restart: unless-stopped
    depends_on:
      - api
    env_file:
      - .env
    ports:
      - '3000:3000'
    networks:
      - aviva-network

networks:
  aviva-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
