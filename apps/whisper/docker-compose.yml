version: "3.9"

services:
  whisper:
    build: .
    ports:
      - "8000:8000"
    environment:
      WHISPER_API_SECRET: local-whisper-secret
      WHISPER_MODEL_SIZE: medium
      WHISPER_DEVICE: cpu
      WHISPER_COMPUTE_TYPE: int8
    volumes:
      - whisper_models:/app/models

volumes:
  whisper_models:
