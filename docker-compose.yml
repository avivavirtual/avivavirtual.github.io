services:
  postgres:
    image: pgvector/pgvector:pg15
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-avivavirtual_db}
      POSTGRES_USER: ${POSTGRES_USER:-aviva_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aviva_password}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aviva_user} -d ${POSTGRES_DB:-avivavirtual_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  api:
    build: apps/api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3001:3001"
    volumes:
      - ./uploads:/app/uploads
      - ./recordings:/app/recordings
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-aviva_user}:${POSTGRES_PASSWORD:-aviva_password}@postgres:5432/${POSTGRES_DB:-avivavirtual_db}
      REDIS_URL: redis://redis:6379
      WHISPER_SELF_HOSTED_URL: http://whisper:8000

  celery_worker:
    build: apps/api
    command: celery -A celery_app worker --loglevel=info -Q transcription,summarization,embeddings,default --concurrency=4
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
      - ./recordings:/app/recordings
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-aviva_user}:${POSTGRES_PASSWORD:-aviva_password}@postgres:5432/${POSTGRES_DB:-avivavirtual_db}
      REDIS_URL: redis://redis:6379
      WHISPER_SELF_HOSTED_URL: http://whisper:8000
    healthcheck:
      test: ["CMD-SHELL", "celery -A celery_app inspect ping -d celery@$$HOSTNAME --timeout=5 | grep -q pong"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  celery_beat:
    build: apps/api
    command: celery -A celery_app beat --loglevel=info
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-aviva_user}:${POSTGRES_PASSWORD:-aviva_password}@postgres:5432/${POSTGRES_DB:-avivavirtual_db}
      REDIS_URL: redis://redis:6379
    healthcheck:
      test: ["NONE"]

  celery_flower:
    build: apps/api
    command: celery -A celery_app flower --port=5555
    restart: unless-stopped
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_healthy
      celery_worker:
        condition: service_healthy
    env_file: .env
    environment:
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5555 >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_SOCKET_URL: http://localhost:3001

  whisper:
    build: apps/whisper
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - whisper_models:/app/models
    env_file: .env
    environment:
      WHISPER_MODEL_SIZE: tiny
      WHISPER_DEVICE: cpu
      WHISPER_COMPUTE_TYPE: int8
    deploy:
      resources:
        limits:
          memory: 4G

  pgadmin:
    image: dpage/pgadmin4
    profiles: ["dev"]
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@avivavirtual.ca
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"

volumes:
  postgres_data:
  whisper_models:
