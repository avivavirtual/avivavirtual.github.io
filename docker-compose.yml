services:
  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_DB: avivavirtual
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports: ["5432:5432"]
    volumes: ["postgres_data:/var/lib/postgresql/data"]
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql://postgres:password@postgres:5432/avivavirtual}
      REDIS_URL: ${DOCKER_REDIS_URL:-redis://redis:6379}
    depends_on: [postgres, redis]
    ports: ["3001:3001"]
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    env_file: .env
    depends_on: [api]
    ports: ["3000:3000"]
  pgadmin:
    image: dpage/pgadmin4
    profiles: ["devtools"]
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@avivavirtual.ca
      PGADMIN_DEFAULT_PASSWORD: admin
    ports: ["5050:80"]
volumes:
  postgres_data:
